name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck:functions
      - run: CF_PAGES=1 npm run build:pages
      - name: Enforce bundle size budget
        run: |
          INITIAL=$(ls dist/app/browser/*.js 2>/dev/null | head -1 | xargs wc -c | awk '{print $1}')
          if [ -n "$INITIAL" ] && [ "$INITIAL" -gt 2097152 ]; then
            echo "ERROR: Initial bundle size ($INITIAL bytes) exceeds 2MB budget (2097152 bytes)"
            exit 1
          fi
          echo "Bundle size check passed ($INITIAL bytes)"
